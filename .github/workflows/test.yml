name: Test
on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        description: Which branch of @percy/cli to use for this run
        required: false
        type: string
        default: master

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          text: ${{ github.event.inputs.branch }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        run: exit 1
        if: ${{ github.event_name == 'workflow_dispatch' && steps.regex-match.outputs && steps.regex-match.outputs.match == '' }}
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Set up @percy/cli from git
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          cd /tmp
          git clone --branch "$BRANCH" --depth 1 https://github.com/percy/cli
          cd cli
          # The CLI monorepo is a yarn workspace; `npm install` runs a lerna
          # postinstall that fails. Build + link with yarn, then link the
          # @percy/* packages into this repo's node_modules and put percy on PATH.
          PERCY_PACKAGES=`find packages -mindepth 1 -maxdepth 1 -type d | sed -e 's/packages/@percy/g' | tr '\n' ' '`
          yarn
          yarn build
          yarn global:link
          cd "$WORKSPACE"
          yarn link $PERCY_PACKAGES
          echo "$(yarn global bin)" >> "$GITHUB_PATH"
          export PATH="$(yarn global bin):$PATH"
          npx percy --version
      - run: npm run test:coverage
