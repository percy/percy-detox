name: Test
on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        description: Which branch of @percy/cli to use for this run
        required: false
        type: string
        default: master

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18, 20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          text: ${{ github.event.inputs.branch }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        run: exit 1
        if: ${{ github.event_name == 'workflow_dispatch' && steps.regex-match.outputs && steps.regex-match.outputs.match == '' }}
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Set up @percy/cli from git
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          cd /tmp
          git clone --branch "$BRANCH" --depth 1 https://github.com/percy/cli
          cd cli
          npm install
          npm run build
          npm link
          cd "$WORKSPACE"
          npm link @percy/cli
          npx percy --version
      - run: npm test
